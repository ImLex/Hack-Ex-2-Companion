name: Build iOS (unsigned IPA)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: "1"
  EXPO_NO_TELEMETRY: "1"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Generate the iOS native project
        run: bun x expo prebuild -p ios

      - name: Build (unsigned)
        shell: bash
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building scheme $SCHEME from $WORKSPACE"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build | xcbeautify --renderer github-actions

      - name: Package IPA
        shell: bash
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n1)
          test -n "$APP_PATH" || { echo "No .app produced"; exit 1; }
          echo "Packaging $APP_PATH"
          APP_NAME=$(basename "$APP_PATH" .app)
          test -f "$APP_PATH/$APP_NAME" || { echo "App binary missing — build did not complete"; exit 1; }
          ls "$APP_PATH/PlugIns"/*.appex >/dev/null || { echo "Broadcast extension (.appex) missing from PlugIns"; exit 1; }
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          # No -y: store symlink targets as real files — AltStore rejects
          # IPAs containing symlink entries as invalid.
          zip -qr HackEX2Companion-unsigned.ipa Payload
          SIZE=$(stat -f%z HackEX2Companion-unsigned.ipa)
          echo "IPA size: $SIZE bytes"
          test "$SIZE" -gt 5000000 || { echo "IPA suspiciously small — refusing to upload"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: HackEX2Companion-unsigned-ipa
          path: HackEX2Companion-unsigned.ipa
          retention-days: 30
