name: Build iOS (unsigned IPA)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: "1"
  EXPO_NO_TELEMETRY: "1"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Generate the iOS native project
        run: bun x expo prebuild -p ios

      - name: Build (unsigned)
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building scheme $SCHEME from $WORKSPACE"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build | xcbeautify --renderer github-actions

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n1)
          test -n "$APP_PATH" || { echo "No .app produced"; exit 1; }
          echo "Packaging $APP_PATH"
          ls "$APP_PATH/PlugIns" || echo "WARNING: no PlugIns folder — broadcast extension missing!"
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qry HackEX2Companion-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: HackEX2Companion-unsigned-ipa
          path: HackEX2Companion-unsigned.ipa
          retention-days: 30
